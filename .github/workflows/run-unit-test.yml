name: Run Unit Tests


on: [push]

jobs:
  run-unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: 
          node-version: 20
          cache: 'pnpm'

      - run: pnpm ci

      - run: pnpm test:unit

    